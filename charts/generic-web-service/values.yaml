# 默认基础参考参数 (values.yaml)
replicaCount: 1

image:
  repository: nginx
  tag: stable
  pullPolicy: IfNotPresent

containerPort: 80

command: []
# 示例启动命令覆盖：
# command: ["uvicorn"]

args: []
# 示例启动参数覆盖：
# args: ["main:app", "--host", "0.0.0.0", "--port", "8000"]

env: []
# 示例环境变量注入：
# env:
#   - name: APP_ENV
#     value: dev

livenessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 15
  periodSeconds: 20

readinessProbe:
  enabled: true
  path: /
  initialDelaySeconds: 15
  periodSeconds: 20

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: kong-k8s
  paths:
    - path: /
      pathType: Prefix
