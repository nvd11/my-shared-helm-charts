{{- if .Values.route.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}-route
  labels:
    app: {{ .Release.Name }}
spec:
  parentRefs:
  - name: {{ .Values.route.parentGateway }}
    {{- if .Values.route.parentGatewayNamespace }}
    namespace: {{ .Values.route.parentGatewayNamespace }}
    {{- end }}
  rules:
  - matches:
    - path:
        type: {{ .Values.route.pathType }}
        value: {{ .Values.route.path }}
    {{- if .Values.route.stripPath }}
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    {{- end }}
    backendRefs:
    - name: {{ .Release.Name }}
      port: {{ .Values.service.port }}
{{- end }}